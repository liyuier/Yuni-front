name: Trigger Yuni3 Build
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.YUNI3_REPO_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'liyuier',
              repo: 'Yuni3',
              workflow_id: 'build.yml',
              ref: 'master'
            })
